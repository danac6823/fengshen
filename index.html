  const [amount, setAmount] = useState("");
  const [cat, setCat] = useState("餐飲");
  const [note, setNote] = useState("");
  const [newCur, setNewCur] = useState("JPY");
  const [fx, setFx] = useState("");
  const [confirmDel, setConfirmDel] = useState(false);
  const [payer, setPayer] = useState(people[0].id);
  const [sharers, setSharers] = useState(people.map((p) => p.id));
  const [newPerson, setNewPerson] = useState("");
  const [pay, setPay] = useState("刷卡");
  const [editId, setEditId] = useState(null);
  const [expCard, setExpCard] = useState("");
  const reconCards = (cards || []).filter((c) => isRecon(c.type));
  const payCard = expCard || (reconCards[0] && reconCards[0].id) || (cards && cards[0] && cards[0].id) || "";
  const [showCur, setShowCur] = useState(trip.currencies.length === 0);
  const [showPpl, setShowPpl] = useState(((trip.people && trip.people.length) || 1) <= 1);
  const curList = ["TWD", ...trip.currencies.map((c) => c.code)];
  const total = tripTotal(trip);
  const multi = people.length > 1;
  const addExpense = () => {
    const amt = parseFloat(amount); if (!amt) return;
    const sh = !multi ? people.map((p) => p.id) : (sharers.length ? sharers : [payer]);
    const prev = editId ? trip.expenses.find((e) => e.id === editId) : null;
    const date = prev ? prev.date : todayStr();
    const expId = editId || uid();
    const card = pay === "刷卡" ? payCard : "";
    let ledgerTxId = prev ? prev.ledgerTxId : null;
    if (pay === "刷卡" && card) ledgerTxId = upsertCardTx(ledgerTxId, { date, amount: amt * rateIn(trip, cur), merchant: note.trim() || `旅遊·${trip.name}`, cardId: card, tripId: trip.id });
    else if (ledgerTxId) { removeCardTx(ledgerTxId); ledgerTxId = null; }
    const fields = { amount: amt, cur, cat, note: note.trim(), pay, card, ledgerTxId, payer: multi ? payer : people[0].id, sharers: sh };
    if (editId) updateTrip(trip.id, { expenses: trip.expenses.map((e) => (e.id === editId ? { ...e, ...fields } : e)) });
    else updateTrip(trip.id, { people, expenses: [{ id: expId, date, ...fields }, ...trip.expenses] });
    setAmount(""); setNote(""); setEditId(null);
  };
  const startEdit = (e) => { setEditId(e.id); setAmount(String(e.amount)); setCur(e.cur); setCat(e.cat); setPay(e.pay || "刷卡"); setNote(e.note || ""); setPayer(e.payer || people[0].id); setSharers((e.sharers && e.sharers.length) ? e.sharers : people.map((p) => p.id)); setExpCard(e.card || ""); if (typeof window !== "undefined") window.scrollTo({ top: 0, behavior: "smooth" }); };
  const cancelEdit = () => { setEditId(null); setAmount(""); setNote(""); };
  const delExp = (id) => { const e = trip.expenses.find((x) => x.id === id); if (e && e.ledgerTxId) removeCardTx(e.ledgerTxId); updateTrip(trip.id, { expenses: trip.expenses.filter((x) => x.id !== id) }); };
  const addPerson = () => { const n = newPerson.trim(); if (!n) return; const id = uid(); updateTrip(trip.id, { people: [...people, { id, name: n }] }); setSharers((x) => [...x, id]); setNewPerson(""); };
  const rmPerson = (id) => { updateTrip(trip.id, { people: people.filter((p) => p.id !== id) }); setSharers((x) => x.filter((y) => y !== id)); if (payer === id) setPayer(people[0].id); };
  const toggleSharer = (id) => setSharers((x) => (x.includes(id) ? x.filter((y) => y !== id) : [...x, id]));
  const addCurrency = () => { if (!newCur || newCur === "TWD" || trip.currencies.some((c) => c.code === newCur)) return; updateTrip(trip.id, { currencies: [...trip.currencies, { code: newCur, rate: 0 }] }); };
  const setRate = (code, rate) => updateTrip(trip.id, { currencies: trip.currencies.map((c) => (c.code === code ? { ...c, rate: +rate || 0 } : c)) });
  const rmCurrency = (code) => updateTrip(trip.id, { currencies: trip.currencies.filter((c) => c.code !== code) });
  async function updateRates() { setFx("loading"); try { const r = await fetch("https://open.er-api.com/v6/latest/TWD"); const d = await r.json(); if (d && d.rates) { updateTrip(trip.id, { currencies: trip.currencies.map((c) => ({ ...c, rate: d.rates[c.code] ? +(1 / d.rates[c.code]).toFixed(4) : c.rate })) }); setFx("done"); setTimeout(() => setFx(""), 1500); } else setFx("err"); } catch { setFx("err"); } }
  const finish = () => updateTrip(trip.id, { status: "done" });
  const cardExpCount = trip.expenses.filter((e) => e.pay === "刷卡").length;
  const byCat = {}; for (const e of trip.expenses) byCat[e.cat] = (byCat[e.cat] || 0) + e.amount * rateIn(trip, e.cur);
  const catEntries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
  const byCur = {}; for (const e of trip.expenses) { (byCur[e.cur] = byCur[e.cur] || { orig: 0, twd: 0 }); byCur[e.cur].orig += e.amount; byCur[e.cur].twd += e.amount * rateIn(trip, e.cur); }
  const budget = +trip.budget || 0;
  const cashTotal = trip.expenses.reduce((a, e) => a + (e.pay === "現金" ? e.amount * rateIn(trip, e.cur) : 0), 0);
  const cardTotal = total - cashTotal;
  const pById = Object.fromEntries(people.map((p) => [p.id, p]));
  const paid = {}, share = {};
  for (const p of people) { paid[p.id] = 0; share[p.id] = 0; }
  for (const e of trip.expenses) {

    if (paid[pyr] != null) paid[pyr] += twdAmt;
    const per = sh.length ? twdAmt / sh.length : 0;
    for (const id of sh) if (share[id] != null) share[id] += per;
  }
  const net = {}; for (const p of people) net[p.id] = paid[p.id] - share[p.id];
  const debtors = people.filter((p) => net[p.id] < -0.5).map((p) => ({ id: p.id, amt: -net[p.id] })).sort((a, b) => b.amt - a.amt);

  const settle = []; let di = 0, ci = 0;
  while (di < debtors.length && ci < creditors.length) { const pay = Math.min(debtors[di].amt, creditors[ci].amt); settle.push({ from: debtors[di].id, to: creditors[ci].id, amt: pay }); debtors[di].amt -= pay; creditors[ci].amt -= pay; if (debtors[di].amt < 0.5) di++; if (creditors[ci].amt < 0.5) ci++; }
  const curSpend = {}; for (const e of trip.expenses) curSpend[e.cur] = (curSpend[e.cur] || 0) + e.amount * rateIn(trip, e.cur);
  let primaryCur = "TWD", _best = -1;

  const NO_DEC = ["JPY", "KRW", "VND"];

          <div className="text-right"><div style={{ color: C.muted }} className="text-[11px]">總花費</div><div style={{ fontVariantNumeric: "tabular-nums" }} className="text-2xl font-extrabold">{twd(total)}</div></div>
        </div>
        {budget > 0 && (<div className="mt-3"><div className="h-1.5 rounded-full" style={{ background: C.paper }}><div className="h-full rounded-full" style={{ width: pct(Math.min(total / budget, 1)), background: total > budget ? C.loss : C.self }} /></div><div style={{ color: total > budget ? C.loss : C.muted }} className="text-[11px] mt-1">預算 {twd(budget)}{total > budget ? ` · 超出 ${twd(total - budget)}` : ` · 剩 ${twd(budget - total)}`}</div></div>)}
      </section>
      <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
        <div className="flex items-center justify-between">
          <button onClick={() => setShowCur((v) => !v)} className="flex items-center gap-2 text-left flex-1 min-w-0"><span className="text-sm font-bold shrink-0">幣別 · 匯率</span><span style={{ color: C.muted }} className="text-xs truncate">{showCur ? "▲ 收合" : `▼ ${trip.currencies.length ? trip.currencies.map((c) => c.code).join("、") : "未設定"}`}</span></button>

          <div className="space-y-2 mb-4">{catEntries.map(([c, v]) => (<div key={c}><div className="flex justify-between text-sm mb-1"><span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-sm" style={{ background: TRIP_COLOR[c] }} />{c}</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(v)} <span style={{ color: C.muted }} className="text-xs">{pct(v / total)}</span></span></div><div className="h-1.5 rounded-full" style={{ background: C.paper }}><div className="h-full rounded-full" style={{ width: pct(v / total), background: TRIP_COLOR[c] }} /></div></div>))}</div>
          <h3 className="text-sm font-bold mb-2">幣別小計</h3>
          <div className="space-y-1">{Object.entries(byCur).map(([code, v]) => <div key={code} className="flex justify-between text-sm"><span>{code} <span style={{ color: C.muted }} className="text-xs">{code !== "TWD" ? `${cs(code)}${v.orig.toLocaleString()}` : ""}</span></span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(v.twd)}</span></div>)}</div>
        </section>
      )}
      {multi && trip.expenses.length > 0 && (
        <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
          <h3 className="text-sm font-bold mb-3">分帳結算{primaryCur !== "TWD" ? `(以 ${cs(primaryCur)} ${primaryCur} 計)` : ""}</h3>
          <div style={{ color: C.muted }} className="text-[11px] mb-2">＋ 應收(別人欠你) · － 應付(你要付出){primaryCur !== "TWD" ? " · 下排為換算台幣" : ""}</div>
          <div className="space-y-2 mb-3">{people.map((p) => (
            <div key={p.id} className="flex items-start justify-between text-sm">
              <span className="font-medium pt-0.5">{p.name}</span>
              <div className="text-right">
                <div style={{ color: net[p.id] >= 0 ? C.gain : C.loss, fontVariantNumeric: "tabular-nums" }} className="font-bold">{net[p.id] >= 0 ? "＋" : "－"}{showAmt(Math.abs(net[p.id]))}</div>
                {primaryCur !== "TWD" && <div style={{ color: C.muted }} className="text-[11px]">≈ {net[p.id] >= 0 ? "＋" : "－"}{twd(Math.abs(net[p.id]))}</div>}
                <div style={{ color: C.muted }} className="text-[11px]">付 {showAmt(paid[p.id])} · 分 {showAmt(share[p.id])}</div>
              </div>
            </div>
          ))}</div>
          {settle.length > 0 ? (<div style={{ borderTop: `1px solid ${C.border}` }} className="pt-3 space-y-2">{settle.map((x, i) => (
            <div key={i} className="flex items-center gap-2 text-sm">
              <span className="font-semibold">{pById[x.from] ? pById[x.from].name : "?"}</span><span style={{ color: C.muted }}>付給</span><span className="font-semibold">{pById[x.to] ? pById[x.to].name : "?"}</span>
              <span className="ml-auto text-right"><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-bold block">{showAmt(x.amt)}</span>{primaryCur !== "TWD" && <span style={{ color: C.muted }} className="text-[11px]">≈ {twd(x.amt)}</span>}</span>
            </div>
          ))}</div>) : <p style={{ color: C.muted }} className="text-xs">已結清,無人需付款。</p>}
          {mySettles.length > 0 && (
            <div style={{ borderTop: `1px solid ${C.border}` }} className="mt-3 pt-3 space-y-2">
              <div className="text-sm font-bold">我的收付</div>
              {mySettles.map((x, i) => {
                const isRecv = x.to === "me"; const other = isRecv ? x.from : x.to; const done = !!cleared[other];
                return (
                  <div key={i} className="flex items-center gap-2 text-sm">
                    <span className="px-1.5 py-0.5 rounded text-[10px] shrink-0" style={{ background: isRecv ? C.gain : C.loss, color: "#fff" }}>{isRecv ? "應收" : "應付"}</span>
                    <span className="flex-1 truncate">{pById[other] ? pById[other].name : "?"}</span>
                    <span className="text-right"><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium block">{showAmt(x.amt)}</span>{primaryCur !== "TWD" && <span style={{ color: C.muted }} className="text-[11px]">≈ {twd(x.amt)}</span>}</span>
                    {done ? <span style={{ color: C.muted }} className="text-xs shrink-0 w-16 text-right">{isRecv ? "已收" : "已付"}</span>
                          : <button onClick={() => { if (isRecv) setCleared(other, true); else { setCleared(other, true); postSplitPay({ merchant: `分帳付款·${pById[other] ? pById[other].name : ""}`, amount: x.amt, tripId: trip.id }); } }} style={{ background: isRecv ? C.gain : C.act, color: "#fff" }} className="text-[11px] rounded px-2 py-1 shrink-0 w-16">{isRecv ? "標已收" : "標已付款"}</button>}
                  </div>
                );
              })}
              <p style={{ color: C.muted }} className="text-[11px]">應收=別人還你(計入淨資產待收) · 應付=按已付款記一筆支出</p>
            </div>
          )}
        </section>
      )}
      {trip.expenses.length > 0 && (
        <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
          <h3 className="text-sm font-bold mb-3">明細 ({trip.expenses.length}) <span style={{ color: C.muted }} className="text-xs font-normal">· 點任一筆可編輯</span></h3>
          <div className="space-y-1">{trip.expenses.map((e) => (
            <div key={e.id} onClick={() => startEdit(e)} className="flex items-center gap-2 py-1.5 text-sm cursor-pointer" style={{ borderBottom: `1px solid ${C.border}`, background: editId === e.id ? C.paper : "transparent" }}><span className="w-2 h-2 rounded-sm shrink-0" style={{ background: TRIP_COLOR[e.cat] }} /><span style={{ color: C.muted, fontVariantNumeric: "tabular-nums" }} className="text-xs w-12 shrink-0">{e.date.slice(5)}</span><span className="flex-1 truncate">{e.note || e.cat}{multi && e.payer && pById[e.payer] ? ` · ${pById[e.payer].name}付` : ""}</span><span style={{ color: C.muted }} className="text-xs shrink-0">{e.cur !== "TWD" ? `${cs(e.cur)}${e.amount.toLocaleString()}` : ""}</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium shrink-0">{twd(e.amount * rateIn(trip, e.cur))}</span><button onClick={(ev) => { ev.stopPropagation(); delExp(e.id); }} style={{ color: C.muted }} className="text-xs px-1 shrink-0">✕</button></div>
          ))}</div>
        </section>
      )}
      <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5 space-y-3">
        <div className="flex items-center gap-2 text-sm"><span style={{ color: C.muted }} className="text-xs">預算(TWD)</span><input type="number" value={trip.budget} onChange={(e) => updateTrip(trip.id, { budget: e.target.value })} placeholder="未設" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-28 rounded-lg px-2 py-1 text-sm text-right" /></div>
        {trip.expenses.length > 0 && <div style={{ color: C.muted }} className="text-xs leading-relaxed">現金 {twd(cashTotal)}(換鈔已記,不回灌) · 刷卡 {twd(cardTotal)}(已轉 {cardExpCount} 筆待核對)</div>}
        {trip.status === "done" ? (<div style={{ color: C.self }} className="text-sm">✓ 已結束　<button onClick={() => updateTrip(trip.id, { status: "active" })} style={{ color: C.muted }} className="text-xs underline">重新開啟</button></div>) : (<button onClick={finish} style={{ background: C.act, color: "#fff" }} className="w-full rounded-lg py-2.5 text-sm font-semibold">結束此趟</button>)}
        <button onClick={() => (confirmDel ? delTrip(trip.id) : setConfirmDel(true))} style={{ color: C.loss }} className="text-xs">{confirmDel ? "再按一次刪除整趟" : "刪除這趟旅程"}</button>
      </section>
    </div>
  );
}

function Stat({ label, v, color, muted }) {
  return <div><div style={{ color: C.muted }} className="text-[11px] mb-1">{label}</div><div style={{ color: color || (muted ? C.muted : C.ink), fontVariantNumeric: "tabular-nums" }} className="text-lg font-bold">{v}</div></div>;
}

const __root = ReactDOM.createRoot(document.getElementById("root"));
__root.render(<App />);

</script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./sw.js").catch(function (e) { console.warn("SW register failed", e); });
    });
  }
</script>
</body>
</html>
