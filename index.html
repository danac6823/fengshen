function recurringInfo(tx) {
  const by = {};
  for (const t of tx) { const key = (t.merchant || "").trim(); if (!key || key === "（未填商家）") continue; (by[key] = by[key] || []).push(t); }
  const info = {};
  for (const [key, list] of Object.entries(by)) {
    const months = new Set(list.map((t) => t.month));
    const amts = list.map((t) => t.amount);
    const avg = amts.reduce((a, b) => a + b, 0) / amts.length;
    const dev = amts.length > 1 ? Math.max(...amts.map((a) => Math.abs(a - avg))) / (avg || 1) : 1;
    const isRecurring = months.size >= 2;
    info[key] = { key, monthsCount: months.size, avg, isRecurring, isSubscription: isRecurring && dev <= 0.05, category: list[0].category };
  }
  return info;
}

/* 台灣電子發票證明聯左側 QR 解析（純前端：抓號碼/日期/金額/品項，不需 API 或解密） */
function parseInvoiceQR(raw) {
  if (!raw) return null;
  const parts = String(raw).split(/\s+/).filter(Boolean);
  let left = parts.find((p) => !p.startsWith("**") && p.length >= 53);
  const right = parts.find((p) => p.startsWith("**"));
  if (!left) { const t = String(raw).trim(); if (t.startsWith("**")) return { error: "RIGHT_ONLY" }; if (t.length >= 53) left = t; else return { error: "BAD" }; }
  const inv = left.slice(0, 10);
  if (!/^[A-Z]{2}\d{8}$/.test(inv)) return { error: "BAD" };
  const dr = left.slice(10, 17);
  let date = todayStr();
  if (/^\d{7}$/.test(dr)) { const y = parseInt(dr.slice(0, 3), 10) + 1911, mo = dr.slice(3, 5), d = dr.slice(5, 7); if (+mo >= 1 && +mo <= 12 && +d >= 1 && +d <= 31) date = `${y}/${mo}/${d}`; }
  const amount = parseInt(left.slice(29, 37), 16);
  const seller = left.slice(45, 53);
  let products = [];
  try {
    let body = left.slice(77);
    if (right) body += right.replace(/^\*\*/, "");
    if (body.length > 9) {
      const enc = body.charAt(8);
      let prodStr = body.slice(9);
      if (enc === "2") { try { prodStr = decodeURIComponent(escape(atob(prodStr))); } catch {} }
      products = prodStr.split(":").map((t) => t.trim()).filter((t) => /[^\d.\-]/.test(t)).slice(0, 5);
    }
  } catch {}
  return { invoiceNo: inv, date, amount: isFinite(amount) ? amount : 0, products, seller };
}

function classify(merchant, rules) {
  const m = (merchant || "").toLowerCase();
  for (const r of rules) if (r.key && m.includes(r.key.toLowerCase())) return { category: r.category, sub: r.sub || null };
  for (const e of SUBKW) if (e.k.some((k) => m.includes(k.toLowerCase()))) return { category: e.p, sub: e.s };
  return { category: "未分類", sub: null };
}

const SKIP = ["本期應繳", "最低應繳", "前期", "結轉", "循環利息", "本期帳單", "上期", "繳款", "信用額度", "卡號", "小計", "合計", "總計", "total", "balance", "帳單明細", "交易日", "消費明細"];
function parseStatement(text, fallbackYear) {
  const out = [];
  const dateRe = /(\d{4})[/.-](\d{1,2})[/.-](\d{1,2})|(\d{1,2})[/.-](\d{1,2})(?![/.\d])/;
  const amtRe = /-?(?:NT\$|\$)?\s?\d{1,3}(?:,\d{3})+(?:\.\d+)?|-?(?:NT\$|\$)?\s?\d+(?:\.\d+)?/g;
  for (const raw of text.split(/\r?\n/)) {
    const line = raw.trim();
    if (!line) continue;
    const low = line.toLowerCase();
    if (SKIP.some((s) => low.includes(s.toLowerCase()))) continue;
    const dm = line.match(dateRe);
    if (!dm) continue;
    let y, mo, d;
    if (dm[1]) { y = +dm[1]; mo = +dm[2]; d = +dm[3]; } else { y = fallbackYear; mo = +dm[4]; d = +dm[5]; }
    if (mo < 1 || mo > 12 || d < 1 || d > 31) continue;
    const rest = line.replace(dm[0], " ");
    const amts = rest.match(amtRe);
    if (!amts || !amts.length) continue;
    const amtTok = amts[amts.length - 1];
    const amt = parseFloat(amtTok.replace(/[^\d.-]/g, ""));
    if (!isFinite(amt) || amt === 0) continue;
    let merchant = rest.replace(amtTok, " ").replace(/\s+/g, " ").trim().replace(/^[-–·•|\s]+|[-–·•|\s]+$/g, "");
    if (!merchant) merchant = "（未填商家）";
    const date = `${y}/${pad(mo)}/${pad(d)}`;
    out.push({ id: uid(), date, month: monthOf(date), merchant, amount: amt });
  }
  return out;
}

function loadScript(src) { return new Promise((res, rej) => { const sc = document.createElement("script"); sc.src = src; sc.onload = res; sc.onerror = rej; document.head.appendChild(sc); }); }
function parseCsvLine(line) { const out = []; let cur = "", q = false; for (let i = 0; i < line.length; i++) { const c = line[i]; if (c === '"') { if (q && line[i + 1] === '"') { cur += '"'; i++; } else q = !q; } else if (c === "," && !q) { out.push(cur); cur = ""; } else cur += c; } out.push(cur); return out; }

/* 帳期 / 繳款 */
function cycleWindow(closingDay, ref = new Date()) {
  const d = ref.getDate();
  let em = ref.getMonth();
  if (d > closingDay) em += 1;
  const end = new Date(ref.getFullYear(), em, closingDay);
  const start = new Date(ref.getFullYear(), em - 1, closingDay);
  start.setDate(start.getDate() + 1);
  return [start, end];
}
function nextDue(dueDay, ref = new Date()) {
  let dm = ref.getMonth();
  if (ref.getDate() > dueDay) dm += 1;
  return new Date(ref.getFullYear(), dm, dueDay);
}
const daysUntil = (d) => Math.ceil((d - new Date(new Date().toDateString())) / 86400000);

function streakInfo(activity) {
  const set = new Set(activity || []);
  const today = new Date(new Date().toDateString());
  const has = (d) => set.has(dstr(d));
  let anchor = null;
  if (has(today)) anchor = new Date(today);
  else { const y = new Date(today); y.setDate(y.getDate() - 1); if (has(y)) anchor = y; }
  let current = 0;
  if (anchor) { const d = new Date(anchor); while (has(d)) { current++; d.setDate(d.getDate() - 1); } }
  const days = [...set].sort();
  let longest = 0, run = 0, prev = null;
  for (const ds of days) { const cd = toDate(ds); if (prev && (cd - prev) / 86400000 === 1) run++; else run = 1; longest = Math.max(longest, run); prev = cd; }
  return { current, longest, todayDone: has(today) };
}

        if (n.sub && SUB_REMAP[n.sub]) n.sub = SUB_REMAP[n.sub];
        return n;
      });
      ivs = ivs.map((h) => (h.txns ? h : { id: h.id || uid(), name: h.name, type: h.type || "股票", price: (h.value != null ? h.value : (h.cost || 0)), txns: [{ id: uid(), date: "", kind: "買", shares: 1, price: h.cost || 0, fee: 0 }] }));
      setCards(cds); setRules(rls); setInv(ivs); setTx(txs);
      setLoading(false);
    })();
  }, []);
  useEffect(() => { if (!loading && hasStore) sset(K.tx, tx); }, [tx, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.rules, rules); }, [rules, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.inv, inv); }, [inv, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.cards, cards); }, [cards, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.budgets, budgets); }, [budgets, loading]);

  useEffect(() => { if (!loading && hasStore) sset(K.income, income); }, [income, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.assets, assets); }, [assets, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.liab, liabilities); }, [liabilities, loading]);

  useEffect(() => { if (!loading && hasStore) sset(K.reminder, reminderTime); }, [reminderTime, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.trips, trips); }, [trips, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.plans, plans); }, [plans, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.cash, cash); }, [cash, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.snap, snaps); }, [snaps, loading]);
  useEffect(() => { if (!loading && hasStore) sset(K.policy, policies); }, [policies, loading]);

  const cardById = useMemo(() => Object.fromEntries(cards.map((c) => [c.id, c])), [cards]);
  function learn(merchant, cat, sub) {
    const key = (merchant || "").slice(0, 4);
    if (key && sub) setRules((p) => [{ key, category: cat, sub }, ...p.filter((r) => r.key !== key)].slice(0, 300));
  }
  const markActive = () => setActivity((p) => (p.includes(todayStr()) ? p : [...p, todayStr()].slice(-400)));
  const upsertCardTx = (existingId, d) => {
    const id = existingId || uid();
    setTx((p) => {
      const cur = p.find((t) => t.id === id);
      if (cur && cur.status === "confirmed") return p;
      const txObj = { id, date: d.date, month: monthOf(d.date), merchant: d.merchant, amount: Math.round(d.amount), category: "個人", sub: "旅遊", cardId: d.cardId, source: "manual", status: "logged", tripId: d.tripId };
      const ex = p.some((t) => t.id === id);
      return (ex ? p.map((t) => (t.id === id ? txObj : t)) : [txObj, ...p]).sort((a, b) => b.date.localeCompare(a.date));
    });
    return id;
  };
  const removeCardTx = (id) => { if (id) setTx((p) => p.filter((t) => !(t.id === id && t.status !== "confirmed"))); };
  const postSplitPay = (d) => { const id = uid(); const cash = cards.find((c) => c.type === "現金"); const date = todayStr(); setTx((p) => [{ id, date, month: monthOf(date), merchant: d.merchant, amount: Math.round(d.amount), category: "個人", sub: "旅遊", cardId: (cash && cash.id) || (cards[0] && cards[0].id) || "", source: "split", status: "confirmed", tripId: d.tripId }, ...p].sort((a, b) => b.date.localeCompare(a.date))); return id; };
  const postTrip = (trip, total) => {
    const id = trip.ledgerTxId || uid();
    const date = trip.end || todayStr();
    const txObj = { id, date, month: monthOf(date), merchant: `旅遊·${trip.name}`, amount: Math.round(total), category: "個人", sub: "旅遊", cardId: (cards[0] && cards[0].id) || "", source: "trip", status: "confirmed", tripId: trip.id };
    setTx((p) => { const ex = p.some((t) => t.id === id); return (ex ? p.map((t) => (t.id === id ? txObj : t)) : [txObj, ...p]).sort((a, b) => b.date.localeCompare(a.date)); });
    return id;
  };
  async function exportData() { const o = {}; for (const k of Object.values(K)) { const v = await sget(k); if (v != null) o[k] = v; } const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(o)], { type: "application/json" })); a.download = "sanfen-backup.json"; a.click(); }
  function importData(e) { const f = e.target.files && e.target.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = async () => { try { const o = JSON.parse(rd.result); for (const [k, v] of Object.entries(o)) await sset(k, v); location.reload(); } catch {} }; rd.readAsText(f); }
  const notifRef = useRef("");
  useEffect(() => {
    if (!reminderTime || typeof window === "undefined" || !("Notification" in window)) return;
    const id = setInterval(() => {
      try {
        if (Notification.permission !== "granted") return;
        const now = new Date(); const hm = `${pad(now.getHours())}:${pad(now.getMinutes())}`; const td = todayStr();
        if (hm >= reminderTime && notifRef.current !== td && !activity.includes(td)) { notifRef.current = td; new Notification("記帳提醒", { body: "今天還沒記帳,花 10 秒記一筆吧。" }); }
      } catch {}
    }, 60000);
    return () => clearInterval(id);

  return (
    <div style={{ background: C.paper, color: C.ink, fontFamily: '"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif' }} className="min-h-screen pb-24 md:pb-8">
      <div className="max-w-3xl mx-auto px-5 py-6">

/* ---------- 繳款提醒 ---------- */
function Reminders({ cards, tx, budgets = {}, activity = [], view, policies = [] }) {
  const banners = [];
  if (activity.length && !activity.includes(todayStr())) {
    const si = streakInfo(activity);
    banners.push({ id: "streak", color: C.home, text: si.current > 0 ? `今天還沒記帳 · 連續 ${si.current} 天別中斷` : "今天還沒記帳,花 10 秒記一筆", right: "" });
  }
  for (const c of cards) {
    if (!c.dueDay) continue;
    const due = nextDue(+c.dueDay);
    const dleft = daysUntil(due);
    if (dleft > 10 || dleft < 0) continue;
    let amt = 0;
    if (c.closingDay) { const [st, e] = cycleWindow(+c.closingDay); amt = tx.filter((t) => t.cardId === c.id && toDate(t.date) >= st && toDate(t.date) <= e).reduce((a, t) => a + t.amount, 0); }
    banners.push({ id: "due-" + c.id, color: c.color, danger: dleft <= 3, text: `${c.name}${c.last4 ? ` ··${c.last4}` : ""} · 還有 ${dleft} 天繳款`, right: amt > 0 ? `本期約 ${twd(amt)}` : "" });
  }
  for (const p of policies) {
    if (!p.payDate) continue;
    const dleft = daysUntil(toDate(p.payDate));
    if (dleft > 14 || dleft < 0) continue;
    banners.push({ id: "pol-" + p.id, color: PTYPE_COLOR[p.ptype] || C.self, danger: dleft <= 5, text: `${p.name} · 還有 ${dleft} 天繳保費`, right: +p.premium > 0 ? twd(p.premium) : "" });
  }
  const cm = monthOf(todayStr());
  const sp = { total: 0, 家用: 0, 個人: 0, 狗貓: 0 };
  for (const t of tx) if (t.month === cm) { sp.total += t.amount; if (sp[t.category] != null) sp[t.category] += t.amount; }
  for (const [k, label] of [["total", "本月總額"], ["家用", "家用"], ["個人", "個人"], ["狗貓", "狗貓"]]) {
    const b = +budgets[k] || 0; if (!b) continue;
    const r = sp[k] / b;
    if (r >= 1) banners.push({ id: "bud-" + k, color: C.loss, danger: true, text: `${label} 已超預算`, right: `${twd(sp[k])} / ${twd(b)}` });
    else if (r >= 0.8) banners.push({ id: "bud-" + k, color: C.home, text: `${label} 已用 ${pct(r)} 預算`, right: `${twd(sp[k])} / ${twd(b)}` });
  }
  const list = view === "record" ? banners.filter((b) => b.id !== "streak") : banners;
  if (!list.length) return null;
  return (
    <div className="space-y-1.5 mb-3">
      {list.map((bn) => (
        <div key={bn.id} style={{ background: C.card, border: `1px solid ${C.border}`, borderLeft: `3px solid ${bn.color}` }} className="rounded-lg px-3 py-1.5 text-xs flex items-center gap-2">
          <span className="font-semibold" style={{ color: bn.danger ? C.loss : C.ink }}>{bn.text}</span>
          {bn.right && <span style={{ color: C.muted, fontVariantNumeric: "tabular-nums" }} className="ml-auto">{bn.right}</span>}
        </div>
      ))}
    </div>
  );
}

/* ================= 連續記帳 streak ================= */
function StreakCard({ activity, reminderTime, setReminderTime }) {
  const { current, longest, todayDone } = streakInfo(activity);
  const t = new Date(new Date().toDateString());
  const days = [];
  for (let i = 13; i >= 0; i--) { const d = new Date(t); d.setDate(d.getDate() - i); const ds = dstr(d); days.push({ ds, done: (activity || []).includes(ds), today: i === 0 }); }
  return (
    <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl px-4 py-3">
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-baseline gap-1.5">
          <span style={{ color: C.muted }} className="text-xs">連續記帳</span>
          <span style={{ color: current > 0 ? C.home : C.muted, fontVariantNumeric: "tabular-nums" }} className="text-2xl font-extrabold leading-none">{current}</span>
          <span style={{ color: C.muted }} className="text-xs">天</span>
        </div>
        <span style={{ color: C.muted }} className="text-[11px]">最長 {longest} · {todayDone ? <span style={{ color: C.gain }}>今天已記 ✓</span> : <span style={{ color: C.home }}>今天還沒記</span>}</span>
      </div>
      <div className="flex gap-0.5">
        {days.map((d) => <div key={d.ds} title={d.ds} className="flex-1 h-2.5 rounded-sm" style={{ background: d.done ? C.home : C.paper, outline: d.today ? `1.5px solid ${C.ink}` : "none", outlineOffset: -1 }} />)}
      </div>
    </section>
  );
}

/* ================= 掃發票 QR ================= */
function ScanInvoice({ cards, defaultCard, rules, onAdd, onClose }) {
  const [raw, setRaw] = useState("");
  const [res, setRes] = useState(null);
  const [cat, setCat] = useState(null);
  const [cardId, setCardId] = useState(defaultCard);
  const [merchant, setMerchant] = useState("");
  const [amount, setAmount] = useState("");
  const [date, setDate] = useState("");
  const [imgErr, setImgErr] = useState("");
  const canImg = typeof window !== "undefined" && "BarcodeDetector" in window;

  function applyParsed(p) {
    if (!p || p.error) { setRes(p || { error: "BAD" }); return; }
    const cl = classify(p.products.join(" "), rules);
    setRes(p); setMerchant(p.products[0] || ""); setAmount(String(p.amount || "")); setDate(p.date);
    setCat(cl.category === "未分類" ? null : cl.category);
  }
  function doParse() { applyParsed(parseInvoiceQR(raw)); }
  async function onFile(e) {
    setImgErr(""); const f = e.target.files && e.target.files[0]; if (!f) return;
    try {
      const det = new window.BarcodeDetector({ formats: ["qr_code"] });
      const codes = await det.detect(await createImageBitmap(f));
      if (!codes.length) { setImgErr("照片裡沒偵測到 QR。換張更清楚的發票照片,或改用貼上。"); return; }
      const vals = codes.map((c) => c.rawValue);
      const L = vals.find((v) => !v.startsWith("**")) || vals[0];
      const R = vals.find((v) => v.startsWith("**")) || "";
      const combined = L + (R ? " " + R : "");
      setRaw(combined); applyParsed(parseInvoiceQR(combined));
    } catch { setImgErr("這台裝置不支援照片解碼,請改用貼上 QR 內容。"); }
  }
  function add() {
    const amt = parseInt(amount || "0", 10); if (!amt || !cat) return;
    const cl = classify(merchant, rules);
    const sub = cl.category === cat ? cl.sub : null;
    onAdd({ id: uid(), date: date || todayStr(), month: monthOf(date || todayStr()), merchant: merchant.trim() || "（發票）", amount: amt, category: cat, sub, cardId, source: "scan", status: "confirmed", invoiceNo: res && !res.error ? res.invoiceNo : undefined });
    onClose();
  }
  const ready = res && !res.error;

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{ background: "rgba(38,52,45,0.42)" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-full md:max-w-md max-h-[88vh] overflow-y-auto rounded-t-2xl md:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-3"><h2 className="text-lg font-bold">掃發票 QR</h2><button onClick={onClose} style={{ color: C.muted }} className="text-sm">關閉</button></div>

        {canImg && (
          <label style={{ background: C.act, color: "#fff" }} className="w-full rounded-xl py-2.5 text-sm font-semibold flex items-center justify-center mb-2 cursor-pointer">
            上傳發票照片
            <input type="file" accept="image/*" capture="environment" onChange={onFile} className="hidden" />
          </label>
        )}
        {imgErr && <p style={{ color: C.loss }} className="text-xs mb-2">{imgErr}</p>}

        <p style={{ color: C.muted }} className="text-[11px] mb-1">{canImg ? "或" : ""}用手機相機/發票 App 掃左邊那個 QR,把內容貼進來:</p>
        <textarea value={raw} onChange={(e) => setRaw(e.target.value)} rows={3} placeholder="貼上發票 QR 內容（含發票號碼那個）" style={{ background: C.card, border: `1px solid ${C.border}`, color: C.ink }} className="w-full rounded-lg p-2.5 text-xs font-mono resize-y" />
        <button onClick={doParse} disabled={!raw.trim()} style={{ background: C.self, color: "#fff", opacity: raw.trim() ? 1 : 0.4 }} className="w-full rounded-lg py-2 text-sm font-semibold mt-2">解析</button>

        {res && res.error && <p style={{ color: C.loss }} className="text-sm mt-3">{res.error === "RIGHT_ONLY" ? "這是右邊那個 QR,請掃含發票號碼的左邊 QR。" : "看起來不是發票 QR,請確認內容。"}</p>}

        {ready && (
          <div className="mt-4 space-y-3">
            <div style={{ color: C.muted }} className="text-xs">發票 {res.invoiceNo}{res.products.length ? ` · ${res.products.slice(0, 2).join("、")}` : ""}</div>
            <div className="grid grid-cols-2 gap-2">
              <div><label style={{ color: C.muted }} className="text-[11px]">日期</label><input type="date" value={date.replace(/\//g, "-")} onChange={(e) => setDate(e.target.value.replace(/-/g, "/"))} style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-2 py-1.5 text-sm" /></div>
              <div><label style={{ color: C.muted }} className="text-[11px]">金額</label><input type="number" value={amount} onChange={(e) => setAmount(e.target.value)} style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-2 py-1.5 text-sm" /></div>
            </div>
            <input value={merchant} onChange={(e) => setMerchant(e.target.value)} placeholder="商家/品項（選填）" style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-2 py-1.5 text-sm" />
            <div className="grid grid-cols-3 gap-2">
              {["家用", "個人", "狗貓"].map((c) => <button key={c} onClick={() => setCat(c)} style={{ background: cat === c ? CAT_COLOR[c] : C.card, color: cat === c ? "#fff" : C.ink, border: `1px solid ${cat === c ? CAT_COLOR[c] : C.border}` }} className="py-2 rounded-lg text-sm font-bold">{c}</button>)}
            </div>
            <CardChips cards={cards} value={cardId} onChange={setCardId} />
            <button onClick={add} disabled={!parseInt(amount || "0", 10) || !cat} style={{ background: (!parseInt(amount || "0", 10) || !cat) ? C.border : C.act, color: "#fff" }} className="w-full rounded-lg py-2.5 text-sm font-semibold">加入</button>
          </div>
        )}
      </div>
    </div>
  );
}

function Record({ cards, cardById, tx, setTx, rules, learn, onManage, markActive, activity, reminderTime, setReminderTime }) {
  const [amount, setAmount] = useState("");
  const [cat, setCat] = useState(null);

  const [merchant, setMerchant] = useState("");

  const [showMore, setShowMore] = useState(false);
  const [scan, setScan] = useState(false);
  const [pendingSub, setPendingSub] = useState(null);

  const topSubs = useMemo(() => { if (!cat) return []; const cnt = {}; for (const t of tx) if (t.category === cat && t.sub) cnt[t.sub] = (cnt[t.sub] || 0) + 1; const ranked = Object.entries(cnt).sort((a, b) => b[1] - a[1]).map(([sn]) => sn); return (ranked.length ? ranked : TREE[cat]).slice(0, 3); }, [cat, tx]);

  const key = (d) => {
    if (d === "del") setAmount((a) => a.slice(0, -1));
    else if (d === "ok") save();
    else setAmount((a) => (a.length >= 9 ? a : (a === "0" ? d : a + d)));

  function save() {

  }
  function addScanned(t) {
    markActive();

              className="py-4 rounded-xl text-xl font-bold transition-colors">

          ))}
        </div>
      </div>

      {todays.length > 0 && (
        <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-4">
          <h3 className="text-sm font-bold mb-2">{date.slice(5)} 記錄</h3>
          <div className="space-y-1">
            {todays.map((t) => (
              <div key={t.id} className="flex items-center gap-2 text-sm py-1">
                <span className="w-2 h-2 rounded-sm shrink-0" style={{ background: cardById[t.cardId]?.color || C.none }} />
                <span className="px-1.5 py-0.5 rounded text-[11px] text-white shrink-0" style={{ background: CAT_COLOR[t.category] }}>{t.category}</span>
                <span className="flex-1 truncate">{t.merchant || "（未填商家）"}</span>
                <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(t.amount)}</span>
                <button onClick={() => setTx((p) => p.filter((x) => x.id !== t.id))} style={{ color: C.muted }} className="text-xs px-1">✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ================= 核對（網頁主介面） ================= */
/* 智慧核對:全域最佳配對 + 信心分級 + 分期辨識 */
function rcNorm(x) { return (x || "").toLowerCase().replace(/[\s\-·•|()（）]/g, ""); }
function rcSim(a, b) { a = rcNorm(a); b = rcNorm(b); if (!a || !b) return 0; if (a === b) return 1; if (a.includes(b) || b.includes(a)) return 0.8; const A = new Set(a), B = new Set(b); let c = 0; for (const ch of B) if (A.has(ch)) c++; return c / Math.max(A.size, B.size); }
function isInstallment(m) { return /分期|\d{1,2}\s*\/\s*\d{1,2}期?|\d{1,2}期/.test(m || ""); }
function smartReconcile(rows, manual) {
  const cands = [];
  for (const s of rows) {
    const sd = toDate(s.date);
    for (const m of manual) {
      const dd = Math.abs((toDate(m.date) - sd) / 86400000);
      const ad = Math.abs(m.amount - s.amount);
      const exact = ad <= 0.5;
      const close = ad <= Math.max(30, s.amount * 0.03);
      const ms = rcSim(s.merchant, m.merchant);
      const plausible = (exact && dd <= 7) || (close && dd <= 5 && ms >= 0.3);
      if (!plausible) continue;
      cands.push({ s, m, dd, ad, exact, ms, score: (exact ? 1 : 0.5) - dd * 0.05 + ms * 0.5, strong: exact && dd <= 4 });
    }
  }
  cands.sort((a, b) => b.score - a.score);
  const uS = new Set(), uM = new Set(), strong = [], fuzzy = [];
  for (const c of cands) { if (uS.has(c.s.id) || uM.has(c.m.id)) continue; uS.add(c.s.id); uM.add(c.m.id); (c.strong ? strong : fuzzy).push(c); }
  const stmtOnly = rows.filter((s) => !uS.has(s.id)).map((s) => ({ ...s, installment: isInstallment(s.merchant) }));
  const manualOnly = manual.filter((m) => !uM.has(m.id));
  return { strong, fuzzy, stmtOnly, manualOnly };
}

function Reconcile({ cards, cardById, tx, setTx, rules, onManage }) {
  const reconCards = cards.filter((c) => isRecon(c.type));
  const [cardId, setCardId] = useState(reconCards[0]?.id);

  const [ocrBusy, setOcrBusy] = useState(false);

  const [sel, setSel] = useState(new Set());
  function setFromText(text) { const r = parseStatement(text, year); setRows(r); setResult(null); setImpErr(r.length ? "" : "沒抓到交易行。可在下方表格手動新增,或換個來源。"); }
  function onCSV(e) { const f = e.target.files && e.target.files[0]; if (!f) return; const rd = new FileReader(); rd.onload = () => { const lines = String(rd.result).split(/\r?\n/).map((l) => parseCsvLine(l).join(" ")).join("\n"); setFromText(lines); }; rd.readAsText(f, "utf-8"); e.target.value = ""; }
  async function onImage(e) { const f = e.target.files && e.target.files[0]; if (!f) return; setOcrBusy(true); setImpErr(""); try { if (!window.Tesseract) await loadScript("https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"); const out = await window.Tesseract.recognize(f, "chi_tra+eng"); setFromText(out.data.text); } catch (err) { setImpErr("辨識失敗或無法載入 OCR,請改用貼上或 CSV。"); } setOcrBusy(false); e.target.value = ""; }
  const updRow = (id, k, v) => setRows((p) => p.map((r) => (r.id === id ? { ...r, [k]: k === "amount" ? (+v || 0) : v, ...(k === "date" ? { month: monthOf(v) } : {}) } : r)));
  const delRow = (id) => setRows((p) => p.filter((r) => r.id !== id));
  const addRow = () => setRows((p) => [...(p || []), { id: uid(), date: todayStr(), month: monthOf(todayStr()), merchant: "", amount: 0 }]);
  const toggleRowBiz = (id) => setRows((p) => p.map((r) => (r.id === id ? { ...r, biz: !r.biz } : r)));
  const allRowsBiz = () => setRows((p) => p.map((r) => ({ ...r, biz: true })));
  const toggle = (id) => setSel((p) => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const reasons = (f) => [!f.exact ? `金額差 ${twd(f.ad)}` : null, f.dd >= 1 ? `日期差 ${Math.round(f.dd)} 天` : null, f.ms >= 0.3 ? "商家相似" : null].filter(Boolean).join(" · ");

  function runMatch() {
    const manual = tx.filter((t) => t.cardId === cardId && t.source === "manual" && t.status !== "confirmed");
    const r = smartReconcile(rows, manual);
    setResult({ ...r, rows: rows.length });
    setSel(new Set(r.fuzzy.filter((f) => f.ms >= 0.4).map((f) => f.s.id)));
    setRows(null);
  }

  function apply() {
    if (!result) return;
    const accepted = result.fuzzy.filter((f) => sel.has(f.s.id));
    const rejected = result.fuzzy.filter((f) => !sel.has(f.s.id));
    const pairs = [...result.strong, ...accepted];
    const matchM = new Set(pairs.map((p) => p.m.id));
    const matchByM = Object.fromEntries(pairs.map((p) => [p.m.id, p.s]));
    const addRows = [...result.stmtOnly, ...rejected.map((f) => ({ ...f.s, installment: isInstallment(f.s.merchant) }))];
    const reviewM = new Set([...result.manualOnly.map((m) => m.id), ...rejected.map((f) => f.m.id)].filter((id) => !matchM.has(id)));
    setTx((prev) => {
      const next = prev.map((t) => {
        if (matchM.has(t.id)) { const s = matchByM[t.id]; const cl = classify(s.merchant, rules); return { ...t, status: "confirmed", merchant: t.merchant || s.merchant, sub: t.sub || (cl.category === t.category ? cl.sub : null), biz: s.biz || t.biz, amount: t.tripId ? s.amount : t.amount }; }
        if (reviewM.has(t.id)) return { ...t, status: "review" };
        return t;
      });
      const added = addRows.map((s) => { const cl = classify(s.merchant, rules); return { id: uid(), date: s.date, month: monthOf(s.date), merchant: s.merchant, amount: s.amount, category: cl.category, sub: cl.sub, cardId, source: "statement", status: "confirmed", installment: s.installment || undefined, biz: s.biz || undefined }; });
      return [...added, ...next].sort((a, b) => b.date.localeCompare(a.date));
    });
    setResult(null); setPaste(""); setSel(new Set());
  }

  return (

        <button onClick={() => setFromText(paste)} disabled={!paste.trim()} style={{ background: C.self, color: "#fff", opacity: paste.trim() ? 1 : 0.4 }} className="w-full rounded-lg py-2 text-sm font-semibold mt-2">解析貼上內容</button>
        <div className="grid grid-cols-2 gap-2 mt-2">
          <label style={{ background: C.card, border: `1px solid ${C.border}`, color: C.ink }} className="rounded-lg py-2 text-sm font-semibold text-center cursor-pointer">匯入 CSV<input type="file" accept=".csv,text/csv" onChange={onCSV} className="hidden" /></label>
          <label style={{ background: C.card, border: `1px solid ${C.border}`, color: C.ink }} className="rounded-lg py-2 text-sm font-semibold text-center cursor-pointer">{ocrBusy ? "辨識中…" : "掃描截圖"}<input type="file" accept="image/*" onChange={onImage} className="hidden" disabled={ocrBusy} /></label>
        </div>
        {impErr && <p style={{ color: C.loss }} className="text-xs mt-2">{impErr}</p>}
      </div>

      {rows && (
        <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-4">
          <div className="flex items-center justify-between mb-2"><h3 className="text-sm font-bold">預覽 / 修正 ({rows.length})</h3><div className="flex gap-3"><button onClick={allRowsBiz} style={{ color: C.self }} className="text-xs underline">全標公司</button><button onClick={addRow} style={{ color: C.self }} className="text-xs underline">新增一列</button></div></div>

            {rows.map((r) => (
              <div key={r.id} className="flex items-center gap-1">
                <input type="date" value={r.date.replace(/\//g, "-")} onChange={(e) => updRow(r.id, "date", e.target.value.replace(/-/g, "/"))} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="rounded px-1 py-1 text-xs" />
                <input value={r.merchant} onChange={(e) => updRow(r.id, "merchant", e.target.value)} placeholder="商家" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="flex-1 min-w-0 rounded px-2 py-1 text-xs" />
                <input type="number" value={r.amount} onChange={(e) => updRow(r.id, "amount", e.target.value)} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-20 rounded px-1 py-1 text-xs text-right" />

          <div className="grid grid-cols-4 gap-2 text-center">

                    <div className="flex justify-between text-sm" style={{ color: C.muted }}><span className="truncate pr-2">你記 {f.m.date.slice(5)} {f.m.merchant || "（未填商家）"}</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="shrink-0">{twd(f.m.amount)}</span></div>
                    <div style={{ color: C.muted }} className="text-[11px]">{reasons(f)}</div>

          {result.stmtOnly.length > 0 && (
            <Bucket title="帳單有、你沒記到 → 會補進來" color={C.home}>
              {result.stmtOnly.map((s) => <Line key={s.id} left={`${s.date.slice(5)} ${s.merchant}${s.installment ? " · 分期" : ""}`} right={twd(s.amount)} />)}
            </Bucket>

          {result.manualOnly.length > 0 && (
            <Bucket title="你記了、帳單沒有 → 標待確認" color={C.loss}>
              {result.manualOnly.map((m) => <Line key={m.id} left={`${m.date.slice(5)} ${m.merchant || "（未填商家）"}`} right={twd(m.amount)} />)}
            </Bucket>

          {result.strong.length > 0 && (
            <Bucket title="已對上 → 標已核對,並補子分類" color={C.self}>
              {result.strong.map((x) => <Line key={x.m.id} left={`${x.s.date.slice(5)} ${x.s.merchant}`} right={twd(x.s.amount)} />)}

          <button onClick={apply} style={{ background: C.act, color: "#fff" }} className="w-full rounded-lg py-2.5 text-sm font-semibold">套用核對結果</button>
        </div>

      </>
      )}
    </div>
  );

function Tally({ n, label, color }) {

function Bucket({ title, color, children }) {

function Line({ left, right }) {

function ReimburseReport({ items, monthLabel, onClose }) {
  const [copied, setCopied] = useState(false);
  const total = items.reduce((a, t) => a + t.amount, 0);
  const subtotals = useMemo(() => { const o = {}; for (const t of items) { const k = t.sub || t.category || "未分類"; o[k] = (o[k] || 0) + t.amount; } return Object.entries(o).sort((a, b) => b[1] - a[1]); }, [items]);
  const csvCell = (x) => { const v = String(x == null ? "" : x); return /[",\n]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; };
  function downloadCSV() {
    const lines = [["日期", "商家", "類型", "金額"].join(",")];
    for (const t of items) lines.push([t.date, csvCell(t.merchant), csvCell(t.sub || t.category || ""), t.amount].join(","));
    lines.push(["", "", "總計", total].join(","));
    const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob(["\uFEFF" + lines.join("\n")], { type: "text/csv;charset=utf-8" })); a.download = `報帳單-${monthLabel}.csv`; a.click();
  }
  async function copyText() {
    const text = `報帳單 ${monthLabel}（${items.length} 筆）\n` + items.map((t) => `${t.date}　${t.merchant || ""}　${t.sub || t.category || ""}　${twd(t.amount)}`).join("\n") + `\n總計 ${twd(total)}`;
    try { await navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500); } catch {}
  }
  function printReport() {
    const esc = (x) => String(x == null ? "" : x).replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const w = window.open("", "_blank"); if (!w) return;
    const rows = items.map((t) => `<tr><td>${t.date}</td><td>${esc(t.merchant)}</td><td>${esc(t.sub || t.category || "")}</td><td class="r">${t.amount.toLocaleString()}</td></tr>`).join("");
    const subs = subtotals.map(([k, v]) => `<tr><td>${esc(k)}</td><td class="r">${v.toLocaleString()}</td></tr>`).join("");
    w.document.write(`<!doctype html><meta charset="utf-8"><title>報帳單 ${esc(monthLabel)}</title><style>body{font-family:system-ui,"PingFang TC";padding:24px;color:#1E2B29}h1{font-size:18px}h3{font-size:13px;color:#6E7972;margin:14px 0 4px}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #ddd;padding:6px 8px;font-size:13px;text-align:left}.r{text-align:right}.tot{font-weight:800;font-size:16px;margin-top:14px;text-align:right}</style><h1>報帳單　${esc(monthLabel)}（${items.length} 筆）</h1><h3>類型小計</h3><table>${subs}</table><h3>明細</h3><table><tr><th>日期</th><th>商家</th><th>類型</th><th class="r">金額</th></tr>${rows}</table><p class="tot">總計　NT$${total.toLocaleString()}</p>`);
    w.document.close(); w.focus(); setTimeout(() => w.print(), 300);
  }
  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{ background: "rgba(38,52,45,0.42)" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-full md:max-w-lg max-h-[88vh] overflow-y-auto rounded-t-2xl md:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-3"><h2 className="text-lg font-bold">報帳單 · {monthLabel}</h2><button onClick={onClose} style={{ color: C.muted }} className="text-sm">關閉</button></div>
        <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-xl p-4 mb-3">
          <div style={{ color: C.muted }} className="text-xs mb-2">類型小計</div>
          <div className="space-y-1">
            {subtotals.map(([k, v]) => (<div key={k} className="flex justify-between text-sm"><span>{k}</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(v)}</span></div>))}
          </div>
          <div className="flex justify-between mt-3 pt-3 text-base" style={{ borderTop: `1px solid ${C.border}` }}><span className="font-bold">總計</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-extrabold">{twd(total)}</span></div>
        </div>
        <div style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-xl p-4 mb-3">
          <div style={{ color: C.muted }} className="text-xs mb-2">明細（{items.length} 筆）</div>
          <div className="space-y-1 max-h-60 overflow-y-auto">
            {items.map((t) => (
              <div key={t.id} className="flex items-center gap-2 text-sm">
                <span style={{ color: C.muted, fontVariantNumeric: "tabular-nums" }} className="text-xs w-12 shrink-0">{t.date.slice(5)}</span>
                <span className="flex-1 truncate">{t.merchant || "（未填商家）"}</span>
                <span style={{ color: C.muted }} className="text-[11px] shrink-0">{t.sub || t.category}</span>
                <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium shrink-0">{twd(t.amount)}</span>
              </div>
            ))}
          </div>
        </div>
        <div className="grid grid-cols-3 gap-2">
          <button onClick={downloadCSV} style={{ background: C.act, color: "#fff" }} className="rounded-lg py-2.5 text-sm font-semibold">下載 CSV</button>
          <button onClick={copyText} style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }} className="rounded-lg py-2.5 text-sm font-semibold">{copied ? "已複製" : "複製文字"}</button>
          <button onClick={printReport} style={{ background: C.card, color: C.ink, border: `1px solid ${C.border}` }} className="rounded-lg py-2.5 text-sm font-semibold">列印/PDF</button>
        </div>
        <p style={{ color: C.muted }} className="text-[11px] mt-3">申請後收到款項,回交易明細或可報帳卡按各筆「標已收」即可從待收移除。</p>
      </div>
    </div>
  );
}

function Analyze({ cards, cardById, tx, setTx, learn, budgets, setBudgets, fixedOverride, setFixedOverride }) {
  const [month, setMonth] = useState("all");
  const [card, setCard] = useState("all");
  const [expandedCat, setExpandedCat] = useState(null);
  const [excludeBiz, setExcludeBiz] = useState(false);
  const [report, setReport] = useState(false);

  const months = useMemo(() => Array.from(new Set(tx.map((t) => t.month))).sort().reverse(), [tx]);
  const filtered = useMemo(() => tx.filter((t) => (month === "all" || t.month === month) && (card === "all" || t.cardId === card) && (!excludeBiz || !t.biz)), [tx, month, card, excludeBiz]);
  const bizSum = useMemo(() => {
    let dueAmt = 0, dueCount = 0, doneAmt = 0; const dueList = [];
    for (const t of tx) if ((month === "all" || t.month === month) && (card === "all" || t.cardId === card) && t.biz) {
      if (t.reimbursed) doneAmt += t.amount; else { dueAmt += t.amount; dueCount++; dueList.push(t); }
    }
    return { dueAmt, dueCount, doneAmt, dueList };
  }, [tx, month, card]);

  const totals = useMemo(() => { const o = { 家用: 0, 個人: 0, 狗貓: 0, 未分類: 0, total: 0 }; for (const t of filtered) { const c = t.category || "未分類"; o[c] += t.amount; o.total += t.amount; } return o; }, [filtered]);
  const subBreak = useMemo(() => { const o = {}; for (const t of filtered) { const p = t.category || "未分類", s = t.sub || "（未指定）"; (o[p] = o[p] || {})[s] = (o[p][s] || 0) + t.amount; } return o; }, [filtered]);
  const trend = useMemo(() => { const m = {}; for (const t of tx) { if (card !== "all" && t.cardId !== card) continue; (m[t.month] = m[t.month] || { month: t.month, 家用: 0, 個人: 0, 狗貓: 0, 未分類: 0 })[t.category || "未分類"] += t.amount; } return Object.values(m).sort((a, b) => a.month.localeCompare(b.month)); }, [tx, card]);

  const recInfo = useMemo(() => recurringInfo(tx), [tx]);
  const monthsObserved = useMemo(() => new Set(tx.map((t) => t.month)).size, [tx]);
  const fixedKeys = useMemo(() => {
    const set = new Set();
    for (const v of Object.values(recInfo)) { const ov = fixedOverride[v.key]; if (ov === undefined ? v.isRecurring : ov) set.add(v.key); }
    for (const [k, val] of Object.entries(fixedOverride)) if (val) set.add(k);
    return set;
  }, [recInfo, fixedOverride]);
  const budgetMonth = month === "all" ? monthOf(todayStr()) : month;
  const monthTx = useMemo(() => tx.filter((t) => t.month === budgetMonth), [tx, budgetMonth]);
  const spend = useMemo(() => { const o = { total: 0, 家用: 0, 個人: 0, 狗貓: 0 }; for (const t of monthTx) { o.total += t.amount; if (o[t.category] != null) o[t.category] += t.amount; } return o; }, [monthTx]);
  const fixedTotal = useMemo(() => monthTx.filter((t) => fixedKeys.has((t.merchant || "").trim())).reduce((a, t) => a + t.amount, 0), [monthTx, fixedKeys]);
  const recurringList = useMemo(() => Object.values(recInfo).filter((v) => fixedKeys.has(v.key)).sort((a, b) => b.avg - a.avg), [recInfo, fixedKeys]);
  const toggleFixed = (key, val) => setFixedOverride((p) => ({ ...p, [key]: val }));

  const toggleBiz = (id) => setTx((p) => p.map((t) => (t.id === id ? { ...t, biz: !t.biz } : t)));
  const toggleReimbursed = (id) => setTx((p) => p.map((t) => (t.id === id ? { ...t, reimbursed: !t.reimbursed } : t)));
  function setSub(id, sub, merchant) {
    const cat = sub ? SUB_PARENT[sub] : "未分類";
    setTx((p) => p.map((t) => (t.id === id ? { ...t, category: cat, sub: sub || null } : t)));
    if (sub) learn(merchant, cat, sub);
  }

  return (
    <div className="space-y-4">
      {months.length > 0 && <div className="flex gap-2 overflow-x-auto pb-1"><Chip active={month === "all"} onClick={() => setMonth("all")}>全部月份</Chip>{months.map((m) => <Chip key={m} active={month === m} onClick={() => setMonth(m)}>{m}</Chip>)}</div>}
      {cards.length > 1 && <CardChips cards={cards} value={card} onChange={setCard} allowAll />}
      <div className="flex">
        <button onClick={() => setExcludeBiz((v) => !v)} style={{ background: excludeBiz ? C.act : C.card, color: excludeBiz ? C.paper : C.muted, border: `1px solid ${excludeBiz ? C.act : C.border}` }} className="px-3 py-1 rounded-full text-xs font-medium">{excludeBiz ? "已排除公司支出" : "排除公司支出"}</button>
      </div>
      {(bizSum.dueCount > 0 || bizSum.doneAmt > 0) && (
        <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
          <div className="flex items-center gap-2 mb-3">
            <span className="px-1.5 py-0.5 rounded text-[10px]" style={{ background: C.act, color: "#fff" }}>公司</span>
            <span className="text-sm font-bold">可報帳</span>
            <span className="ml-auto text-sm" style={{ color: C.muted }}>已收 {twd(bizSum.doneAmt)}</span>
          </div>
          <div className="flex items-baseline justify-between mb-3">
            <span style={{ color: C.muted }} className="text-xs">待收(應收報帳款)</span>
            <span style={{ fontVariantNumeric: "tabular-nums", color: C.home }} className="text-2xl font-extrabold">{twd(bizSum.dueAmt)}</span>
          </div>
          {bizSum.dueList.length > 0 && (
            <div className="space-y-1 max-h-44 overflow-y-auto">
              {bizSum.dueList.map((t) => (
                <div key={t.id} className="flex items-center gap-2 text-sm">
                  <span style={{ color: C.muted, fontVariantNumeric: "tabular-nums" }} className="text-xs w-12 shrink-0">{t.date.slice(5)}</span>
                  <span className="flex-1 truncate">{t.merchant || "（未填商家）"}</span>
                  <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(t.amount)}</span>
                  <button onClick={() => toggleReimbursed(t.id)} style={{ background: C.self, color: "#fff" }} className="text-[11px] rounded px-2 py-0.5 shrink-0">標已收</button>
                </div>
              ))}
            </div>
          )}
          {bizSum.dueCount > 0 && <button onClick={() => setReport(true)} style={{ background: C.act, color: "#fff" }} className="w-full rounded-lg py-2.5 text-sm font-semibold mt-3">產生報帳單 ({bizSum.dueCount} 筆)</button>}
        </section>
      )}
      {report && <ReimburseReport items={bizSum.dueList} monthLabel={month === "all" ? "全部待收" : month} onClose={() => setReport(false)} />}

      <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-6">
        <div className="flex items-baseline justify-between mb-4">
          <span style={{ color: C.muted }} className="text-xs">{month === "all" ? "累計支出" : `${month} 支出`}</span>
          <span style={{ fontVariantNumeric: "tabular-nums" }} className="text-3xl font-extrabold">{twd(totals.total)}</span>
        </div>
        {totals.total > 0 ? (
          <>
            <div className="flex h-7 rounded-lg overflow-hidden mb-4" style={{ background: C.paper }}>
              {CATS.filter((c) => totals[c] > 0).map((c) => <div key={c} style={{ width: pct(totals[c] / totals.total), background: CAT_COLOR[c] }} />)}
            </div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {CATS.map((c) => (
                <button key={c} onClick={() => setExpandedCat(expandedCat === c ? null : c)} style={{ background: expandedCat === c ? C.paper : "transparent", border: `1px solid ${expandedCat === c ? C.border : "transparent"}` }} className="text-left rounded-lg p-2 -m-2 transition-colors">
                  <div className="flex items-center gap-1.5 mb-0.5"><span className="w-2.5 h-2.5 rounded-sm" style={{ background: CAT_COLOR[c] }} /><span style={{ color: C.muted }} className="text-xs">{c}</span><span style={{ color: C.muted }} className="text-[10px] ml-auto">{expandedCat === c ? "▴" : "▾"}</span></div>
                  <div style={{ fontVariantNumeric: "tabular-nums" }} className="text-base font-bold">{twd(totals[c])}</div>
                  <div style={{ color: C.muted }} className="text-[11px]">{pct(totals[c] / totals.total)}</div>
                </button>
              ))}
            </div>
            {expandedCat && (
              <div style={{ borderColor: C.border }} className="mt-4 pt-4 border-t">
                <div style={{ color: C.muted }} className="text-xs mb-3"><span style={{ color: CAT_COLOR[expandedCat] }} className="font-semibold">{expandedCat}</span> 細項</div>
                {(() => {
                  const entries = Object.entries(subBreak[expandedCat] || {}).sort((a, b) => b[1] - a[1]);
                  const max = entries.length ? entries[0][1] : 0;
                  if (!entries.length) return <p style={{ color: C.muted }} className="text-sm">此類別本期沒有資料。</p>;
                  return <div className="space-y-2.5">{entries.map(([s, v]) => (
                    <div key={s}><div className="flex justify-between text-sm mb-1"><span>{s}</span><span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(v)} <span style={{ color: C.muted }} className="text-xs">{pct(v / totals[expandedCat])}</span></span></div><div className="h-1.5 rounded-full" style={{ background: C.paper }}><div className="h-full rounded-full" style={{ width: pct(v / max), background: CAT_COLOR[expandedCat] }} /></div></div>
                  ))}</div>;
                })()}
              </div>
            )}
          </>
        ) : <div style={{ color: C.muted }} className="text-sm py-6 text-center">這個範圍還沒有資料。到「記帳」或「核對」加入交易。</div>}
      </section>

      <BudgetCard monthLabel={budgetMonth} spend={spend} budgets={budgets} setBudgets={setBudgets} />

      {trend.length > 1 && (
        <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
          <h3 className="text-sm font-bold mb-3">每月支出趨勢</h3>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={trend} margin={{ top: 4, right: 4, left: -18, bottom: 0 }}>
              <XAxis dataKey="month" tick={{ fontSize: 11, fill: C.muted }} tickFormatter={(m) => m.slice(5)} axisLine={false} tickLine={false} />
              <YAxis tick={{ fontSize: 11, fill: C.muted }} axisLine={false} tickLine={false} tickFormatter={(v) => (v >= 1000 ? `${v / 1000}k` : v)} />
              <Tooltip formatter={(v, n) => [twd(v), n]} contentStyle={{ fontSize: 12, borderRadius: 8, border: `1px solid ${C.border}` }} />
              {CATS.map((c) => <Bar key={c} dataKey={c} stackId="a" fill={CAT_COLOR[c]} radius={c === "未分類" ? [3, 3, 0, 0] : 0} />)}
            </BarChart>
          </ResponsiveContainer>
        </section>
      )}

      <RecurringCard monthLabel={budgetMonth} fixed={fixedTotal} total={spend.total} list={recurringList} monthsObserved={monthsObserved} onToggle={toggleFixed} />

      {filtered.length > 0 && (
        <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
          <h3 className="text-sm font-bold mb-3">交易明細 <span style={{ color: C.muted }} className="font-normal">({filtered.length})</span></h3>
          <div className="space-y-1">
            {filtered.map((t) => (
              <div key={t.id} className="flex items-center gap-2 py-1.5 text-sm" style={{ borderBottom: `1px solid ${C.border}` }}>
                <span className="w-2 h-2 rounded-sm shrink-0" title={cardById[t.cardId]?.name} style={{ background: cardById[t.cardId]?.color || C.none }} />
                <span style={{ color: C.muted, fontVariantNumeric: "tabular-nums" }} className="text-xs w-12 shrink-0">{t.date.slice(5)}</span>
                <span className="flex-1 truncate">{t.merchant || "（未填商家）"}</span>
                <span style={{ background: STATUS[t.status]?.c || C.none }} className="text-[10px] text-white rounded px-1 py-0.5 shrink-0 hidden sm:inline">{STATUS[t.status]?.t}</span>
                <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium shrink-0">{twd(t.amount)}</span>
                <select value={t.sub || ""} onChange={(e) => setSub(t.id, e.target.value, t.merchant)} style={{ background: CAT_COLOR[t.category], color: "#fff", border: "none", maxWidth: "5rem" }} className="text-[11px] rounded-md px-1 py-1 shrink-0 font-medium appearance-none cursor-pointer truncate">
                  <option value="" style={{ background: "#fff", color: C.ink }}>未指定</option>
                  {Object.entries(TREE).map(([p, subs]) => <optgroup key={p} label={p}>{subs.map((s) => <option key={s} value={s} style={{ background: "#fff", color: C.ink }}>{s}</option>)}</optgroup>)}
                </select>
                <button onClick={() => toggleBiz(t.id)} title="公司/可報帳" style={{ background: t.biz ? C.act : "transparent", color: t.biz ? "#fff" : C.muted, border: `1px solid ${t.biz ? C.act : C.border}` }} className="text-[10px] rounded px-1 py-0.5 shrink-0">公</button>
                <button onClick={() => setTx((p) => p.filter((x) => x.id !== t.id))} style={{ color: C.muted }} className="text-xs shrink-0 px-1">✕</button>
              </div>
            ))}
          </div>
        </section>
      )}
    </div>
  );
}

/* ================= 卡片管理 ================= */
function CardsModal({ cards, setCards, tx, onClose }) {
  const upd = (id, k, v) => setCards((p) => p.map((c) => (c.id === id ? { ...c, [k]: v } : c)));
  const add = () => setCards((p) => [...p, { id: uid(), name: "新卡片", last4: "", color: CARD_PALETTE[p.length % CARD_PALETTE.length], bank: "", type: "信用卡", closingDay: "", dueDay: "" }]);
  const [confirmId, setConfirmId] = useState(null);
  const del = (id) => { if (cards.length <= 1) return; if (confirmId === id) { setCards((p) => p.filter((c) => c.id !== id)); setConfirmId(null); } else setConfirmId(id); };

  return (
    <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center" style={{ background: "rgba(38,52,45,0.42)" }} onClick={onClose}>
      <div onClick={(e) => e.stopPropagation()} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-full md:max-w-lg max-h-[85vh] overflow-y-auto rounded-t-2xl md:rounded-2xl p-5">
        <div className="flex items-center justify-between mb-4"><h2 className="text-lg font-bold">支付方式</h2><button onClick={onClose} style={{ color: C.muted }} className="text-sm">完成</button></div>
        <div className="space-y-3">
          {cards.map((c) => (
            <div key={c.id} style={{ background: C.card, border: `1px solid ${C.border}`, borderLeft: `4px solid ${c.color}` }} className="rounded-xl p-3 space-y-2">
              <div className="flex gap-2">
                <input value={c.name} onChange={(e) => upd(c.id, "name", e.target.value)} placeholder="名稱" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="flex-1 rounded-lg px-2 py-1.5 text-sm" />
                {c.type !== "現金" && <input value={c.last4} onChange={(e) => upd(c.id, "last4", e.target.value.replace(/\D/g, "").slice(0, 4))} placeholder="末四碼" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-20 rounded-lg px-2 py-1.5 text-sm" />}
              </div>
              <div className="flex gap-2">
                <input value={c.bank} onChange={(e) => upd(c.id, "bank", e.target.value)} placeholder="銀行" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="flex-1 rounded-lg px-2 py-1.5 text-sm" />
                <select value={c.type} onChange={(e) => upd(c.id, "type", e.target.value)} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="rounded-lg px-2 py-1.5 text-sm">{PAY_TYPES.map((t) => <option key={t}>{t}</option>)}</select>
                <button onClick={() => del(c.id)} style={{ color: C.loss }} className="text-xs ml-auto shrink-0">{confirmId === c.id ? "再按一次確認" : "刪除"}</button>
              </div>
              {isRecon(c.type) && (
              <div className="flex gap-2 items-center">
                <label style={{ color: C.muted }} className="text-xs">結帳日</label>
                <input type="number" min="1" max="31" value={c.closingDay} onChange={(e) => upd(c.id, "closingDay", e.target.value)} placeholder="—" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-14 rounded-lg px-2 py-1.5 text-sm" />
                <label style={{ color: C.muted }} className="text-xs ml-2">繳款日</label>
                <input type="number" min="1" max="31" value={c.dueDay} onChange={(e) => upd(c.id, "dueDay", e.target.value)} placeholder="—" style={{ background: C.paper, border: `1px solid ${C.border}` }} className="w-14 rounded-lg px-2 py-1.5 text-sm" />
              </div>
              )}
              <div className="flex gap-1.5">
                {CARD_PALETTE.map((col) => <button key={col} onClick={() => upd(c.id, "color", col)} style={{ background: col, outline: c.color === col ? `2px solid ${C.ink}` : "none", outlineOffset: 2 }} className="w-5 h-5 rounded-full" />)}
              </div>
            </div>

function Ring({ rate }) {

  const p = rate == null ? 0 : Math.max(0, Math.min(1, rate));
  const col = rate == null ? C.muted : rate < 0 ? C.loss : rate < 0.1 ? C.home : C.gain;
  return (

      <text x="64" y="62" textAnchor="middle" fontSize="26" fontWeight="800" fill={C.ink}>{rate == null ? "—" : `${Math.round(rate * 100)}%`}</text>
      <text x="64" y="82" textAnchor="middle" fontSize="12" fill={C.muted}>儲蓄率</text>
    </svg>
  );
}

function settleDate(dateStr, n = 2) {
  if (!dateStr) return dateStr;
  const d = toDate(dateStr);
  if (isNaN(d.getTime())) return dateStr;
  let added = 0;
  while (added < n) { d.setDate(d.getDate() + 1); const wd = d.getDay(); if (wd !== 0 && wd !== 6) added++; }
  return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())}`;
}
function holdingStats(h) {
  let shares = 0, cost = 0, realized = 0;
  const txns = [...(h.txns || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  for (const t of txns) {
    const sh = +t.shares || 0, pr = +t.price || 0, fee = +t.fee || 0;
    if (t.kind === "賣") { const avg = shares > 0 ? cost / shares : 0; const n = Math.min(sh, shares); realized += n * pr - fee - n * avg; cost -= n * avg; shares -= n; }
    else { cost += sh * pr + fee; shares += sh; }
  }
  const avgCost = shares > 0 ? cost / shares : 0; const price = +h.price || 0;
  return { shares, avgCost, invested: cost, value: shares * price, unreal: shares * (price - avgCost), realized, price };
}
function planDue(plan) {
  if (!plan.lastDone) return true;
  if (plan.freq === "weekly") return (toDate(todayStr()) - toDate(plan.lastDone)) / 86400000 >= 7;
  return monthOf(plan.lastDone) < monthOf(todayStr());
}
// 交割帳戶可用資金（券商現金）：入金+股利+賣出 − 買進 − 出金
function settlementCash(inv, cash) {
  let buy = 0, sell = 0;
  for (const h of inv || []) for (const t of (h.txns || [])) { const v = (+t.shares || 0) * (+t.price || 0), fee = +t.fee || 0; if (t.kind === "賣") sell += v - fee; else buy += v + fee; }
  let net = sell - buy;
  for (const c of cash || []) net += c.kind === "出金" ? -(+c.amount || 0) : (+c.amount || 0);
  return net;
}
// 已實現損益依年度（賣出當年）
function realizedByYear(inv) {
  const by = {};
  for (const h of inv || []) {
    let shares = 0, cost = 0;
    const txns = [...(h.txns || [])].sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    for (const t of txns) {
      const sh = +t.shares || 0, pr = +t.price || 0, fee = +t.fee || 0;
      if (t.kind === "賣") { const avg = shares > 0 ? cost / shares : 0; const n = Math.min(sh, shares); const r = n * pr - fee - n * avg; const y = (t.date || "").slice(0, 4) || "—"; by[y] = (by[y] || 0) + r; cost -= n * avg; shares -= n; }
      else { cost += sh * pr + fee; shares += sh; }
    }
  }
  return by;
}
// 年化報酬 XIRR（資金加權，僅含買/賣/股利/期末市值；不含入金出金）
function xirr(flows) {
  const fs = (flows || []).filter((f) => f.date && isFinite(f.amt)).map((f) => ({ d: toDate(f.date), amt: f.amt })).sort((a, b) => a.d - b.d);
  if (fs.length < 2) return null;
  const hasPos = fs.some((f) => f.amt > 0), hasNeg = fs.some((f) => f.amt < 0);
  if (!hasPos || !hasNeg) return null;
  const t0 = fs[0].d, yrs = (d) => (d - t0) / (365 * 86400000);
  let r = 0.1;
  for (let i = 0; i < 80; i++) {
    let npv = 0, der = 0;
    for (const f of fs) { const y = yrs(f.d); const base = Math.pow(1 + r, y); npv += f.amt / base; der += -y * f.amt / (base * (1 + r)); }
    if (Math.abs(der) < 1e-9) break;
    const nr = r - npv / der;
    if (!isFinite(nr) || nr <= -0.9999) { r = (r - 0.9999) / 2 > -0.9 ? r * 0.5 : r; if (!isFinite(r)) return null; continue; }
    if (Math.abs(nr - r) < 1e-7) { r = nr; break; }
    r = nr;
  }
  return isFinite(r) ? r : null;
}

                    <span className="flex-1 truncate">{a.name}{a.hist && a.hist.length ? <span style={{ color: C.muted }} className="text-[11px]"> · 更新 {a.hist[a.hist.length - 1].date.slice(5)}</span> : ""}</span>
                    <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(a.value)}</span>

                  {openAcc === a.id && (

        <div className="grid grid-cols-12 gap-2 mt-3">

          <input placeholder="金額" type="number" value={lf.value} onChange={(e) => setLf({ ...lf, value: e.target.value })} style={{ background: C.paper, border: `1px solid ${C.border}` }} className="col-span-2 rounded-lg px-2 py-2 text-sm" />

        <div className="flex items-center justify-between mb-3"><h3 className="text-sm font-bold">保單</h3><button onClick={() => { setShowPF(!showPF); setEditP(null); setPolf(BLANK_POL); }} style={{ color: C.self }} className="text-xs">{showPF ? "收合" : "＋ 新增保單"}</button></div>
        {policies.length > 0 && (
          <div>
            {PROTECT_TYPES.some((tp) => protectCov[tp] > 0) && (
              <div className="mb-3">
                <div style={{ color: C.muted }} className="text-[11px] mb-1">保障額度</div>
                {PROTECT_TYPES.filter((tp) => protectCov[tp] > 0).map((tp) => (
                  <div key={tp} className="flex items-center gap-2 text-sm py-0.5">
                    <span className="w-2 h-2 rounded-sm shrink-0" style={{ background: PTYPE_COLOR[tp] }} />
                    <span className="flex-1">{tp}</span>
                    <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-medium">{twd(protectCov[tp])}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="flex justify-between text-xs mb-1" style={{ color: C.muted }}><span>年繳保費合計</span><span style={{ fontVariantNumeric: "tabular-nums", color: C.ink }} className="font-semibold">{twd(annualPrem)}</span></div>
            {policyValue > 0 && <div className="flex justify-between text-xs mb-2" style={{ color: C.muted }}><span>保單現值(解約金) · 已入淨資產</span><span style={{ fontVariantNumeric: "tabular-nums", color: C.ink }} className="font-semibold">{twd(policyValue)}</span></div>}
            <div className="space-y-1 mb-1 mt-2">{policies.map((p) => (
              <div key={p.id} style={{ borderBottom: `1px solid ${C.border}` }} className="py-1.5">
                <div className="flex items-center gap-2 text-sm">
                  <span className="w-2 h-2 rounded-sm shrink-0" style={{ background: PTYPE_COLOR[p.ptype] || C.none }} />
                  <span className="flex-1 truncate">{p.name} <span style={{ color: C.muted }} className="text-xs">{p.ptype}{p.company ? ` · ${p.company}` : ""}</span></span>
                  <button onClick={() => { setEditP(p.id); setPolf({ name: p.name, company: p.company || "", ptype: p.ptype, coverage: String(p.coverage || ""), premium: String(p.premium || ""), payFreq: p.payFreq || "yearly", payDate: p.payDate || "", hasValue: !!p.hasValue, cashValue: String(p.cashValue || ""), beneficiary: p.beneficiary || "", note: p.note || "" }); setShowPF(true); }} style={{ color: C.self }} className="text-xs shrink-0">編輯</button>
                  <button onClick={() => setPolicies((arr) => arr.filter((x) => x.id !== p.id))} style={{ color: C.muted }} className="text-xs px-1 shrink-0">✕</button>
                </div>
                <div className="flex flex-wrap gap-x-3 pl-4 text-[11px]" style={{ color: C.muted }}>
                  {+p.coverage > 0 && <span>保額 {twd(p.coverage)}</span>}
                  {+p.premium > 0 && <span>{(PFREQ.find(([v]) => v === p.payFreq) || [])[1] || "年繳"} {twd(p.premium)}</span>}
                  {p.hasValue && +p.cashValue > 0 && <span>現值 {twd(p.cashValue)}</span>}
                  {p.payDate && <span>次繳 {p.payDate.slice(5)}</span>}
                </div>
              </div>
            ))}</div>
          </div>
        )}
        {!policies.length && !showPF && <p style={{ color: C.muted }} className="text-xs">新增保單,追蹤保障額度與保費繳費日;儲蓄/投資型的現值會自動計入淨資產。</p>}
        {showPF && (
          <div style={{ background: C.paper, border: `1px solid ${C.border}` }} className="rounded-xl p-3 mt-2 space-y-2">
            <input placeholder="保單名稱（如 南山美滿人生）" value={polf.name} onChange={(e) => setPolf({ ...polf, name: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-3 py-2 text-sm" />
            <div className="grid grid-cols-2 gap-2">
              <input placeholder="保險公司" value={polf.company} onChange={(e) => setPolf({ ...polf, company: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg px-3 py-2 text-sm" />
              <select value={polf.ptype} onChange={(e) => { const v = e.target.value; setPolf({ ...polf, ptype: v, hasValue: VALUE_TYPES.includes(v) ? true : polf.hasValue }); }} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg px-2 py-2 text-sm">{PTYPES.map((t) => <option key={t}>{t}</option>)}</select>
            </div>
            <div className="grid grid-cols-2 gap-2">
              <input placeholder="保額" type="number" value={polf.coverage} onChange={(e) => setPolf({ ...polf, coverage: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg px-3 py-2 text-sm" />
              <input placeholder="保費（每期）" type="number" value={polf.premium} onChange={(e) => setPolf({ ...polf, premium: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg px-3 py-2 text-sm" />
            </div>
            <div className="flex gap-2">{PFREQ.map(([v, t]) => <button key={v} onClick={() => setPolf({ ...polf, payFreq: v })} style={{ background: polf.payFreq === v ? C.act : C.card, color: polf.payFreq === v ? "#fff" : C.ink, border: `1px solid ${polf.payFreq === v ? C.act : C.border}` }} className="flex-1 py-1.5 rounded-lg text-xs font-medium">{t}</button>)}</div>
            <div className="flex items-center gap-2">
              <span style={{ color: C.muted }} className="text-xs shrink-0">下次繳費日</span>
              <input type="date" value={(polf.payDate || "").replace(/\//g, "-")} onChange={(e) => setPolf({ ...polf, payDate: e.target.value.replace(/-/g, "/") })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-lg px-3 py-2 text-sm flex-1" />
            </div>
            <button onClick={() => setPolf({ ...polf, hasValue: !polf.hasValue })} style={{ background: polf.hasValue ? C.self : C.card, color: polf.hasValue ? "#fff" : C.ink, border: `1px solid ${polf.hasValue ? C.self : C.border}` }} className="w-full py-1.5 rounded-lg text-xs font-medium">{polf.hasValue ? "✓ 有保單價值（儲蓄/投資型）" : "有保單價值（解約金）"}</button>
            {polf.hasValue && <input placeholder="目前保單價值 / 解約金" type="number" value={polf.cashValue} onChange={(e) => setPolf({ ...polf, cashValue: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-3 py-2 text-sm" />}
            <input placeholder="受益人（選填）" value={polf.beneficiary} onChange={(e) => setPolf({ ...polf, beneficiary: e.target.value })} style={{ background: C.card, border: `1px solid ${C.border}` }} className="w-full rounded-lg px-3 py-2 text-sm" />
            <button onClick={savePolicy} disabled={!polf.name.trim()} style={{ background: C.act, color: "#fff", opacity: polf.name.trim() ? 1 : 0.4 }} className="w-full rounded-lg py-2 text-sm font-semibold">{editP ? "更新保單" : "加入保單"}</button>
          </div>
        )}
      </section>

    </div>
  );
}

/* ================= 投資（精簡版） ================= */
const ASSETS = ["股票", "ETF", "債券", "現金", "加密", "其他"];
const A_COLOR = { 股票: "#4FA98F", ETF: "#6FB59E", 債券: "#DB9270", 現金: "#A3BD9C", 加密: "#DD89A4", 其他: "#A99BCB" };
function Invest({ inv, setInv, plans, setPlans, cash, setCash }) {
  const [tf, setTf] = useState({ name: "", type: "股票", date: todayStr(), kind: "買", shares: "", price: "", fee: "" });
  const [pf, setPf] = useState({ name: "", type: "股票", amount: "", freq: "monthly" });
  const [exec, setExec] = useState(null);
  const [openH, setOpenH] = useState(null);
  const [cf, setCf] = useState({ kind: "入金", amount: "", date: todayStr(), note: "" });
  const addTxn = (name, type, txn) => setInv((p) => {
    const i = p.findIndex((h) => h.name === name && h.type === type);
    if (i >= 0) return p.map((h, idx) => (idx === i ? { ...h, txns: [...(h.txns || []), txn], price: h.price || txn.price } : h));
    return [...p, { id: uid(), name, type, price: txn.price, txns: [txn] }];
  });
  const submitTxn = () => { if (!tf.name.trim() || !tf.shares || !tf.price) return; addTxn(tf.name.trim(), tf.type, { id: uid(), date: tf.date, kind: tf.kind, shares: +tf.shares, price: +tf.price, fee: +tf.fee || 0 }); setTf({ ...tf, shares: "", price: "", fee: "" }); };
  const setPrice = (id, price) => setInv((p) => p.map((h) => (h.id === id ? { ...h, price: +price || 0 } : h)));
  const delHolding = (id) => setInv((p) => p.filter((h) => h.id !== id));
  const delTxn = (hid, tid) => setInv((p) => p.map((h) => (h.id === hid ? { ...h, txns: (h.txns || []).filter((t) => t.id !== tid) } : h)));
  const addCash = () => { if (!cf.amount) return; setCash((p) => [...(p || []), { id: uid(), kind: cf.kind, amount: +cf.amount, date: cf.date, note: cf.note.trim() }]); setCf({ ...cf, amount: "", note: "" }); };
  const delCash = (id) => setCash((p) => (p || []).filter((c) => c.id !== id));
  const addPlan = () => { if (!pf.name.trim() || !pf.amount) return; setPlans((p) => [...(p || []), { id: uid(), name: pf.name.trim(), type: pf.type, amount: +pf.amount, freq: pf.freq, lastDone: "" }]); setPf({ name: "", type: "股票", amount: "", freq: "monthly" }); };
  const delPlan = (id) => setPlans((p) => p.filter((x) => x.id !== id));
  const runExec = () => { if (!exec || !exec.shares || !exec.price) return; addTxn(exec.plan.name, exec.plan.type, { id: uid(), date: todayStr(), kind: "買", shares: +exec.shares, price: +exec.price, fee: +exec.fee || 0, dca: true }); setPlans((p) => p.map((x) => (x.id === exec.plan.id ? { ...x, lastDone: todayStr() } : x))); setExec(null); };

  const stats = inv.map((h) => ({ h, ...holdingStats(h) }));
  const tot = stats.reduce((o, x) => ({ value: o.value + x.value, invested: o.invested + x.invested, unreal: o.unreal + x.unreal, realized: o.realized + x.realized }), { value: 0, invested: 0, unreal: 0, realized: 0 });
  const ret = tot.invested ? tot.unreal / tot.invested : 0;
  const alloc = {}; for (const x of stats) if (x.value > 0) alloc[x.h.type] = (alloc[x.h.type] || 0) + x.value;
  const due = (plans || []).filter(planDue);
  const cashList = cash || [];
  let buyCost = 0, sellProceeds = 0;
  for (const h of inv) for (const t of (h.txns || [])) { const v = (+t.shares || 0) * (+t.price || 0), fee = +t.fee || 0; if (t.kind === "賣") sellProceeds += v - fee; else buyCost += v + fee; }
  const depo = cashList.filter((c) => c.kind === "入金").reduce((a, c) => a + (+c.amount || 0), 0);
  const wd = cashList.filter((c) => c.kind === "出金").reduce((a, c) => a + (+c.amount || 0), 0);
  const div = cashList.filter((c) => c.kind === "股利").reduce((a, c) => a + (+c.amount || 0), 0);
  const available = depo + div + sellProceeds - buyCost - wd;
  const moves = [];
  for (const h of inv) for (const t of (h.txns || [])) { const v = (+t.shares || 0) * (+t.price || 0), fee = +t.fee || 0; const sd = t.date ? settleDate(t.date) : ""; moves.push(t.kind === "賣" ? { date: sd, label: `賣 ${h.name}`, amt: v - fee } : { date: sd, label: `買 ${h.name}`, amt: -(v + fee) }); }
  for (const c of cashList) moves.push({ id: c.id, manual: true, date: c.date, label: c.kind + (c.note ? ` ${c.note}` : ""), amt: c.kind === "出金" ? -(+c.amount || 0) : (+c.amount || 0) });
  moves.sort((a, b) => (b.date || "").localeCompare(a.date || ""));

  const today = todayStr();
  const xflows = [];
  for (const h of inv) for (const t of (h.txns || [])) { const v = (+t.shares || 0) * (+t.price || 0), fee = +t.fee || 0; if (t.date) xflows.push({ date: t.date, amt: t.kind === "賣" ? (v - fee) : -(v + fee) }); }
  for (const c of cashList) if (c.kind === "股利" && c.date) xflows.push({ date: c.date, amt: +c.amount || 0 });
  if (tot.value > 0) xflows.push({ date: today, amt: tot.value });
  const annualRet = xirr(xflows);
  const divYear = {}; for (const c of cashList) if (c.kind === "股利") { const y = (c.date || "").slice(0, 4) || "—"; divYear[y] = (divYear[y] || 0) + (+c.amount || 0); }
  const curY = today.slice(0, 4);
  const curYDiv = divYear[curY] || 0;
  const yoc = tot.invested > 0 ? curYDiv / tot.invested : 0;
  const divYearArr = Object.entries(divYear).sort((a, b) => b[0].localeCompare(a[0]));
  const realYearArr = Object.entries(realizedByYear(inv)).sort((a, b) => b[0].localeCompare(a[0]));

  return (
    <div className="space-y-4">
      <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-6">
        <div className="grid grid-cols-3 gap-3 mb-3"><Stat label="總市值" v={twd(tot.value)} /><Stat label="投入成本" v={twd(tot.invested)} muted /><Stat label="報酬率" v={`${ret >= 0 ? "+" : ""}${(ret * 100).toFixed(1)}%`} color={tot.unreal >= 0 ? C.gain : C.loss} /></div>
        <div className="flex justify-between items-center text-sm"><span style={{ color: tot.unreal >= 0 ? C.gain : C.loss }}>未實現 {tot.unreal >= 0 ? "+" : ""}{twd(tot.unreal)}</span>{annualRet != null && <span title="資金加權年化報酬（XIRR）" style={{ color: annualRet >= 0 ? C.gain : C.loss }}>年化 {annualRet >= 0 ? "+" : ""}{(annualRet * 100).toFixed(1)}%</span>}<span style={{ color: C.muted }}>已實現 {tot.realized >= 0 ? "+" : ""}{twd(tot.realized)}</span></div>
      </section>

      <section style={{ background: C.card, border: `1px solid ${C.border}` }} className="rounded-2xl p-5">
        <h3 className="text-sm font-bold mb-2">交割帳戶</h3>
        <div className="flex items-baseline justify-between mb-2"><span style={{ color: C.muted }} className="text-xs">可用資金</span><span style={{ fontVariantNumeric: "tabular-nums", color: available >= 0 ? C.ink : C.loss }} className="text-2xl font-extrabold">{twd(available)}</span></div>
        <div style={{ color: C.muted }} className="text-[11px] mb-3 leading-relaxed">入金 {twd(depo)} · 股利 {twd(div)} · 賣出 {twd(sellProceeds)}　|　買進 -{twd(buyCost)} · 出金 -{twd(wd)}</div>
        <div className="flex gap-2 mb-2">{["入金", "出金", "股利"].map((k) => <button key={k} onClick={() => setCf({ ...cf, kind: k })} style={{ background: cf.kind === k ? C.act : C.paper, color: cf.kind === k ? "#fff" : C.ink, border: `1px solid ${cf.kind === k ? C.act : C.border}` }} className="flex-1 py-1.5 rounded-lg text-xs font-medium">{k}</button>)}</div>
        <div className="grid grid-cols-2 gap-2 mb-2">

function BudgetCard({ monthLabel, spend, budgets, setBudgets }) {

/* ================= 旅遊模組 ================= */
const TRIP_CATS = ["住宿", "交通", "餐飲", "景點", "購物", "雜支"];
const TRIP_COLOR = { 住宿: "#7FA9CE", 交通: "#4FA98F", 餐飲: "#DB9270", 景點: "#A99BCB", 購物: "#DD89A4", 雜支: "#A7B4A3" };
const COMMON_CUR = ["TWD", "JPY", "USD", "KRW", "EUR", "THB", "CNY", "HKD", "SGD", "VND", "GBP", "AUD"];
const CUR_SYM = { TWD: "NT$", JPY: "¥", USD: "$", KRW: "₩", EUR: "€", THB: "฿", CNY: "¥", HKD: "HK$", SGD: "S$", VND: "₫", GBP: "£", AUD: "A$" };
const cs = (code) => CUR_SYM[code] || code;
function rateIn(trip, code) { return code === "TWD" ? 1 : ((trip.currencies.find((c) => c.code === code) || {}).rate || 0); }
function tripTotal(trip) { return trip.expenses.reduce((a, e) => a + e.amount * rateIn(trip, e.cur), 0); }

function tripSettlement(trip) {
  const people = (trip.people && trip.people.length) ? trip.people : [{ id: "me", name: "我" }];
  const { pById, paid, share, net, settle } = tripSettlement(trip);
  const cleared = trip.cleared || {};
  const setCleared = (pid, v) => updateTrip(trip.id, { cleared: { ...cleared, [pid]: v } });
  const mySettles = settle.filter((x) => x.from === "me" || x.to === "me");
  return { people, pById, paid, share, net, settle };
}
function tripMyReceivable(trip) {
  const cleared = trip.cleared || {};
  let r = 0;
  for (const x of tripSettlement(trip).settle) if (x.to === "me" && !cleared[x.from]) r += x.amt;
  return r;
}

              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2"><span className="font-bold truncate">{t.name}</span>{t.status === "active" ? <span style={{ background: C.self, color: "#fff" }} className="text-[10px] rounded px-1.5 py-0.5">進行中</span> : <span style={{ background: C.muted, color: "#fff" }} className="text-[10px] rounded px-1.5 py-0.5">已結束</span>}</div>
                <div style={{ color: C.muted }} className="text-xs">{(t.start || "").slice(5)}{t.end ? ` – ${t.end.slice(5)}` : ""} · {t.expenses.length} 筆</div>
              </div>
              <span style={{ fontVariantNumeric: "tabular-nums" }} className="font-extrabold">{twd(tripTotal(t))}</span>
            </button>
          ))}

    </div>

}

function TripView({ trip, updateTrip, delTrip, onBack, cards, upsertCardTx, removeCardTx, postSplitPay }) {
  const people = (trip.people && trip.people.length) ? trip.people : [{ id: "me", name: "我" }];
